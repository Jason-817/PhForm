<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GF Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Biography -->
    <section id="welcome-screen" class="screen">
        <div class="form-container">
            <h1>Welcome!</h1>
            <form id="welcome-form">
                <input type="text" name="name" placeholder="Your name?" required>
                <input type="text" name="age" placeholder="Your age?" required>

                <div class="height-row">
                    <input type="number" name="heightCm" placeholder="Height (cm)">
                    <div id="ftin-inputs" style="display:none;">
                        <input type="number" name="heightFt" placeholder="ft">
                        <input type="number" name="heightIn" placeholder="in">
                    </div>
                    <select id="heightUnit">
                        <option value="cm">cm</option>
                        <option value="ftin">ft/in</option>
                    </select>
                </div>

                <div class="gender-row">
                    <label><input type="radio" name="gender" value="Male" required> Male</label>
                    <label><input type="radio" name="gender" value="Female" required> Female</label>
                </div>

                <textarea name="distinguishingFeatures" placeholder="Distinguishing Features (tattoos, piercing, sixth finger)"></textarea>
                <textarea name="hobbies" placeholder="Hobbies?" required></textarea>
                
                <button type="submit">Next ➡️</button>
            </form>
        </div>
    </section>

    <!-- Intermediate Screen -->
    <section id="name-welcome-screen" class="screen" style="display:none;">
        <div class="form-container">
            <h1 id="welcomeNameText">Welcome!</h1>
            <p>Click the GIF below to continue to the GF Application.</p>
            <img src="yes.gif" alt="Continue" id="continueGif" style="width:100px; cursor:pointer;">
        </div>
    </section>

    <!-- Questionnaire Screen -->
    <section id="questionnaire-screen" class="screen" style="display:none;">
        <div class="form-container scrollable">
            <h1>GF Application</h1>
            <form id="gfForm">
                <p>1. Your idea of a perfect date (3 sentences max):</p>
                <textarea name="perfectDate" rows="6" required></textarea>
                <button type="submit">Submit</button>
            </form>
        </div>
    </section>

    <!-- Plinko Section -->
    <section id="plinko-section" style="display:none;">
        <div class="plinko-container">
            <h1>Would you like to retract your statement?</h1>
            <div class="btn-container">
                <button id="yesBtn">Yes</button>
                <button id="noBtn">No</button>
            </div>
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
